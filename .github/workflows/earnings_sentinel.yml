name: Earnings Sentinel

# Runs ONE long job during the after-close earnings window and loops internally
# (polling SEC every ~45s) — this is how you get sub-minute detection on free
# GitHub Actions despite its 5-minute cron floor: we trigger once, then loop.
#
# PUBLIC-REPO config → UNLIMITED GitHub Actions minutes, so we run WIDE windows that
# fully cover the report ranges (and absorb GitHub's scheduled-run delays).
# GitHub cron is ALWAYS UTC; times below show UK (BST = UTC+1) and US-Eastern (EDT = UTC-4):
#   • AM / pre-open   10:00 → 12:30 UTC  =  11:00am–1:30pm UK  =  6:00–8:30am ET  (150 min)
#                     → covers the whole US pre-open earnings range (MDT, banks, industrials).
#   • After-close     19:30 → 22:00 UTC  =   8:30–11:00pm UK   =  3:30–6:00pm ET  (150 min)
#                     → from before the 9pm-UK close through the lagging 8-Ks (AVGO, CRWD, etc.).
# Safe to be public: NO secrets in this file or the script — keys live in GitHub Secrets.
# Note: GitHub auto-pauses scheduled workflows after 60 days with no repo activity; a commit
# (or the Run-workflow button) re-arms it. Backstop: the worker's 15-min cron covers gaps.

on:
  schedule:
    - cron: "0 10 * * 1-5"      # 10:00 UTC = 11:00am UK (BST) — AM / pre-open (runs 150 min)
    - cron: "30 19 * * 1-5"     # 19:30 UTC =  8:30pm UK (BST) — after-close (runs 150 min, to 11:00pm UK)
  workflow_dispatch: {}          # "Run workflow" button for manual testing

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 160     # must exceed the longest window (AM = 150 min) + setup overhead
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the dedupe state so you aren't re-alerted on the same report.
      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: earnings_sentinel_state.json
          key: esentinel-${{ github.run_id }}
          restore-keys: |
            esentinel-

      - name: Run the sentinel for the earnings window (poll every 45s)
        env:
          STOCK_WATCH_TICKERS: ${{ secrets.STOCK_WATCH_TICKERS }}
          # Dedicated #earnings channel webhook (a NEW secret — separate from the digest one).
          EXISTING_WEBHOOK_URL: ${{ secrets.EARNINGS_WEBHOOK_URL }}
          # Ingest URL is NOT secret — hardcoded here so it never clashes with the
          # USAspending workflow's INGEST_URL. Only the path differs.
          INGEST_URL: "https://lai-yahoo-proxy.tomykuo888.workers.dev/earnings-read-ingest"
          # Same shared key your USAspending engine already uses.
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          # Finnhub consensus estimate (reliable) — optional but recommended for correct beat/miss.
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          POLL_SECONDS: "20"
        # AM window → 150 min (9000s, 10:00→12:30 UTC); after-close → 150 min (9000s, 19:30→22:00 UTC).
        # Manual runs use 150 min. `|| true` so the timeout's exit code doesn't fail the run.
        run: |
          SCHED="${{ github.event.schedule }}"
          if [ "$SCHED" = "0 10 * * 1-5" ]; then DUR=9000; else DUR=9000; fi
          echo "Schedule: '${SCHED:-manual}' → running ${DUR}s"
          timeout $DUR python3 earnings_sentinel.py || true
