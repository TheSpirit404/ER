name: Earnings Sentinel

# Runs ONE long job during the after-close earnings window and loops internally
# (polling SEC every ~45s) — this is how you get sub-minute detection on free
# GitHub Actions despite its 5-minute cron floor: we trigger once, then loop.
#
# Two tight earnings windows (GitHub cron is always UTC):
#   • AM / pre-open      10:45 → 11:10 UTC  (25 min)
#   • After-close        19:55 → 20:30 UTC  (35 min)
# ~60 min/weekday total ≈ 1,290 min/month — fits the free PRIVATE allowance (2,000/mo).
# Note: GitHub cron can start a few minutes late under load, so if a report ever
# lands right at the edge, the dashboard's own 15-min worker cron is the backstop.

on:
  schedule:
    - cron: "45 10 * * 1-5"     # 10:45 UTC ≈ 11:45 BST — AM / pre-open reports
    - cron: "55 19 * * 1-5"     # 19:55 UTC ≈ 20:55 BST — after-close reports
  workflow_dispatch: {}          # "Run workflow" button for manual testing

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the dedupe state so you aren't re-alerted on the same report.
      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: earnings_sentinel_state.json
          key: esentinel-${{ github.run_id }}
          restore-keys: |
            esentinel-

      - name: Run the sentinel for the earnings window (poll every 45s)
        env:
          STOCK_WATCH_TICKERS: ${{ secrets.STOCK_WATCH_TICKERS }}
          # Dedicated #earnings channel webhook (a NEW secret — separate from the digest one).
          EXISTING_WEBHOOK_URL: ${{ secrets.EARNINGS_WEBHOOK_URL }}
          # Ingest URL is NOT secret — hardcoded here so it never clashes with the
          # USAspending workflow's INGEST_URL. Only the path differs.
          INGEST_URL: "https://lai-yahoo-proxy.tomykuo888.workers.dev/earnings-read-ingest"
          # Same shared key your USAspending engine already uses.
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          POLL_SECONDS: "20"
        # AM window → 25 min (1500s); after-close → 35 min (2100s). Manual runs use 35.
        # `|| true` so the timeout's exit code doesn't fail the run (dedupe cache still saves).
        run: |
          SCHED="${{ github.event.schedule }}"
          if [ "$SCHED" = "45 10 * * 1-5" ]; then DUR=1500; else DUR=2100; fi
          echo "Schedule: '${SCHED:-manual}' → running ${DUR}s"
          timeout $DUR python3 earnings_sentinel.py || true
