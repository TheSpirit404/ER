name: USAspending Capital Flows

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: capital_flows_state.json
          key: cf-state-${{ github.run_id }}
          restore-keys: |
            cf-state-

      - name: Run USAspending engine
        env:
          EXISTING_WEBHOOK_URL: ${{ secrets.EXISTING_WEBHOOK_URL }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
        run: python3 usaspending_engine.py
